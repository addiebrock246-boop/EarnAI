name: EarnAI Mega Faucet Hunter

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Launch EarnAI 🚀
        run: python main.py
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          WALLETS_JSON: ${{ secrets.WALLETS_JSON }}
