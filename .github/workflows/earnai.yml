name: EarnAI Daily Flight

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  fly:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Launch EarnAI 🚀
        env:
          COINTIPLY_COOKIES: ${{ secrets.COINTIPLY_COOKIES }}
          WALLET_ADDRESS: ${{ secrets.WALLET_ADDRESS }}
        run: python main.py
