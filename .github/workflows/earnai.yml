name: Fully AI Bot Test

on:
  workflow_dispatch:          # सिर्फ मैन्युअल ट्रिगर

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      models: read            # GitHub Models के लिए जरूरी

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium
      - run: python main.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # अपने-आप
          WALLETS_JSON: ${{ secrets.WALLETS_JSON }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
