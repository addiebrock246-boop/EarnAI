name: EarnAI Job Hunter

on:
  schedule:
    - cron: '0 */6 * * *'   # हर 6 घंटे में ऑटोमैटिक चलेगा
  workflow_dispatch:          # मैन्युअल ट्रिगर का बटन

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 120      # 2 घंटे तक चल सकता है

    steps:
      - name: रिपो चेकआउट करो
        uses: actions/checkout@v4

      - name: Python सेटअप करो
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ज़रूरी लाइब्रेरी इंस्टॉल करो
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: EarnAI लॉन्च करो 🚀
        run: python main.py
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          WALLET_ADDRESS: ${{ secrets.WALLET_ADDRESS }}
