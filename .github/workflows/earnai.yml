name: EarnAI Google Job Hunter

on:
  schedule:
    - cron: '0 */6 * * *'   # हर 6 घंटे में चलेगा
  workflow_dispatch:          # मैन्युअल ट्रिगर

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    # 🔑 ये permission ज़रूरी है GITHUB_TOKEN के लिए
    permissions:
      contents: read
      id-token: write

    steps:
      - name: रिपो चेकआउट
        uses: actions/checkout@v4

      - name: Python सेटअप
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ज़रूरी चीज़ें इंस्टॉल करो
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: EarnAI लॉन्च 🚀
        run: python main.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # अपने-आप उपलब्ध
          WALLET_ADDRESS: ${{ secrets.WALLET_ADDRESS }} # तुम्हारा वॉलेट (पहले से सेट है)
