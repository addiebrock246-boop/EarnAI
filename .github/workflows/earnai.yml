name: EarnAI AI Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      models: read       # 🆕 GitHub Models के लिए ज़रूरी

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Launch EarnAI 🚀
        run: python main.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # अपने-आप
          WALLETS_JSON: ${{ secrets.WALLETS_JSON }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
