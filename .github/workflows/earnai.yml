name: EarnAI Daily Flight

on:
  schedule:
    - cron: '0 */3 * * *'   # हर 3 घंटे में चलेगा
  workflow_dispatch:          # मैन्युअल ट्रिगर के लिए

jobs:
  fly:
    runs-on: ubuntu-latest
    timeout-minutes: 120      # 2 घंटे का समय, ज़रूरत से ज़्यादा

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Launch EarnAI 🚀
        env:
          COINTIPLY_EMAIL: ${{ secrets.COINTIPLY_EMAIL }}
          COINTIPLY_PASSWORD: ${{ secrets.COINTIPLY_PASSWORD }}
          WALLET_ADDRESS: ${{ secrets.WALLET_ADDRESS }}
        run: python main.py
