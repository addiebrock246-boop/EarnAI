name: EarnAI Daily Flight

on:
  schedule:
    - cron: '0 */3 * * *'   # हर 3 घंटे में
  workflow_dispatch:          # मैन्युअल ट्रिगर

jobs:
  fly:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium
          # 1. CloakBrowser का स्टील्थ ब्राउज़र इंस्टॉल करो
          npm install cloakbrowser playwright-core

      - name: Launch EarnAI 🚀
        run: |
          # 2. वर्चुअल डिस्प्ले इंस्टॉल और चलाओ
          sudo apt-get update && sudo apt-get install -y xvfb
          xvfb-run python main.py
        env:
          COINTIPLY_COOKIES: ${{ secrets.COINTIPLY_COOKIES }}
          WALLET_ADDRESS: ${{ secrets.WALLET_ADDRESS }}
